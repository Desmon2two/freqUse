<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frequent use</title>
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <h1 class="header">The frequent used words parser</h1>
      <div class="input">
        <input
          type="file"
          accept=".html,.JSON,.txt"
          multiple
          class="input__file rounded padded"
          placeholder="Select text/HTML/JSON file" />
        <button class="input__button btn bordered rounded padded">Start</button>
      </div>

      <div class="radio-group">
        <div class="radio-group__switch">
          <input
            type="radio"
            name="radio__switch"
            class="radioBtn-inline radio__btn radio__btn--square" />
          <div class="radio__description">Inline</div>
        </div>
        <div class="radio-group__switch">
          <input
            type="radio"
            name="radio__switch"
            class="radioBtn-circle radio__btn radio__btn--square" />
          <div class="radio__description">Circle</div>
        </div>
        <div class="radio-group__switch">
          <input
            type="radio"
            name="radio__switch"
            class="radioBtn-line radio__btn radio-group__btn--square" />
          <div class="radio__description">Line</div>
        </div>
        <div class="radio-group__switch">
          <input
            type="radio"
            name="radio__switch"
            class="radioBtn-line-horizontal radio-group__btn radio__btn--square" />
          <div class="radio__description">Horizontal Line</div>
        </div>
        <div class="radio-group__switch">
          <input
            type="radio"
            name="radio__switch"
            class="radioBtn-falling-down radio-group__btn radio__btn--square" />
          <div class="radio__description">Falling down</div>
        </div>
        <div class="radio-group__loading-indicator loading-indicator">
          loading ind
        </div>
      </div>

      <div class="grid">
        <div class="grid__first-item grid__item bordered rounded">
          <div class="item__textbox">
            <p>Here will be your results!</p>
          </div>
        </div>
        <div class="grid__second-item grid__item bordered rounded"></div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
